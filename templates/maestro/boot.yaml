appId: {{APP_ID}}
---
# Shared boot preamble (runFlow target — lives under common/ so the root
# "*.yaml" glob never runs it standalone). Plain launchApp, NO clearState
# (wipes the dev client's saved Metro URL). Waiting on the boot sentinel proves a real
# dev-login session loaded and rides out the cold dev-client reload.
- launchApp
- tapOn: { text: "Continue", optional: true }   # Expo dev-menu first-launch info
- tapOn: { text: "Not Now", optional: true }     # iOS Apple-ID nag
- extendedWaitUntil:
    visible:
      id: "{{BOOT_SENTINEL_TESTID}}"
    timeout: 60000
