# LaunchThesis per-project config — written by /launchthesis:setup, read by every
# launchthesis skill at start. Repo CLAUDE.md overrides this file where they conflict.
config_version: 1

project:
  name: {{PROJECT_NAME}}
  stack: {{STACK}}            # the AI builder / runtime the validated app will ship on (or "")

docs:
  specs_dir: {{SPECS_DIR}}    # spec docs home, e.g. docs/specs/
  design_dirs: []             # optional: where design references live

product:                      # read by discover (frame/exit/positioning) + strategy
  positioning: {{POSITIONING}}        # CURRENT wedge one-liner — the burned-builder / honest-NO
                                      #   differentiated position an incumbent would avoid copying.
                                      #   Mirror of the in-play versioned wedge in the launch-thesis brief.
  exit_strategy: {{EXIT_STRATEGY}}    # stated exit; keeps framing/claims safe (or "none")
  sensitive_category: {{SENSITIVE}}   # true → strategy flags manipulative plays harder (health, finance, self-image, minors)
  surfaces: []                # optional: known screens/overlays the strategy step maps plays onto
  playbook_ref: {{PLAYBOOK_REF}}      # OPTIONAL override only — engine is self-sufficient; leave empty unless you license a deck kept outside the plugin

modules:
  discover: true              # refine + research (idea → named, hardened wedge)
  product: true               # strategy: GTM + conversion plays
  validate: true              # 48h cold-pay-proof guerrilla sprint
  studio: true                # cross-product playbook

# ── discover module (idea → hardened launch thesis) ──
discover:
  red_team:
    personas: 6
    max_rounds: 3
    kill_threshold: evidence_gated   # evidence_gated | majority | any | unanimous
  reality_probe: { enabled: true, window_hours: 24, min_contacts_drafted: 10 }
  specs_dir: {{SPECS_DIR}}           # reuse docs.specs_dir

# ── validate module (48h live sprint + guerrilla GTM) ──
validate:
  window_hours: 48
  max_window_hours: 96               # marketplace / considered-purchase only
  budget_cap_usd: 50
  clock_start: first_qualified_impression
  sprints_dir: .launchthesis/studio/sprints
  max_concurrent_sprints: 1          # serial-by-default; /validate refuses a 2nd open sprint
  auto_post: false                   # founder posts from own accounts (C1 / ToS)
  gate:
    floor_users: 10
    min_qualified_lands: 25          # exposure denominator
    min_lp_visit_to_signup_rate: 0.05
    rate_min_sample_visits: 40
    require_pay_proof: true
    hard_signal_default: paid        # paid | loi | scarce_action
    allow_brief_override: true
    weights: { payment: 5, loi: 5, scarce_action: 3, activation: 2, signup: 1, intent_click: 0 }
    cohort_weights: { cold_public: 1.0, warm_dm: 0.5, friend: 0.25, unverifiable: 0 }
    min_cold_weight_fraction: 0.6
    max_friend_share: 0.4
    exclude_self: true
    founder_identifiers: []          # emails/handles/cards dropped at ingestion
    pay_proof:
      mode_default: preauth_hold     # preauth_hold (default) | real_charge (opt-in)
      captured: false                # true only under real_charge
      refundable: false
      min_pct_of_price: 25
      cold_required: true
      live_mode_only: true
    max_extensions: 1
    max_repair_attempts: 3           # GATE-NOT-MEASURABLE repair loop
    message_variants_before_kickback: 2
    kill_attribution: { min_qualified_lands: 30 }
  handoff: { max_days_to_first_access: 30 }
  gtm:
    named_list_target: 30
    min_warm_channels: 1
    default_channel_order: [direct_outreach, intent_venues, borrowed_distribution, broadcast]
  deploy:   { provider: {{DEPLOY_PROVIDER}}, project: {{DEPLOY_PROJECT}} }
  data:     { provider: {{DATA_PROVIDER}},   project: {{DATA_PROJECT}} }
  payments: { provider: {{PAY_PROVIDER}},    mode: preauth_hold }
  max_rounds: 3                      # GTM/relaunch + message-variation loops

# ── studio (cross-product learning loop) ──
studio:
  enabled: true
  dir: .launchthesis/studio
  success_criterion: ">=N retained paying users 30 days after launch"
  promote_after_k: 2
  max_concept_cycles: 3              # the ceiling: total discover<->validate round-trips per seed
  max_wedge_recuts: 2                # of those, how many may be a wedge RE-CUT (the expensive
                                     #   cycle — a new named position); GTM/offer re-tests are
                                     #   bounded separately by validate.max_rounds
